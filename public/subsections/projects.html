<script>

/* =========================
DATA (UNCHANGED)
========================= */

const projects = [
{
    id: 0,
    title: "PROJECTS OVERVIEW",
    description: `
        <p>Welcome to the Projects section.</p>
        <p>Use navigation arrows to explore different bodies of work.</p>
    `,
    listImage: "/subsections/projects/list/overview.jpg",
    galleryCount: 0
},
...Array.from({ length: 10 }, (_, i) => ({
    id: i + 1,
    title: `PROJECT ${i + 1}`,
    description: `
        <p>This is Project ${i + 1}.</p>
        <p>Click image to view full gallery.</p>
    `,
    listImage: `/subsections/projects/list/project-${i + 1}.jpg`,
    galleryCount: 3
}))
];

/* =========================
STATE + LOGIC (UNCHANGED)
========================= */

let index = 0;
let gallery = [];
let galleryIndex = 0;

function init() {
    updateDesktop();
    renderMobile();
}

function updateDesktop() {
    const project = projects[index];

    document.getElementById("title").innerHTML = project.title;
    document.getElementById("description").innerHTML = project.description;

    const counter = document.getElementById("counter");
    counter.innerText = project.id === 0 ? "OVERVIEW" : `${project.id} / 10`;

    const img = document.getElementById("project-img");

    img.classList.remove("image-active");
    img.style.opacity = 0;

    setTimeout(() => {
        img.src = project.listImage;
        img.style.opacity = 1;
        img.classList.add("image-active");
    }, 200);

    document.getElementById("image-container").onclick = () => {
        if (project.galleryCount > 0) {
            openGallery(project.id, project.galleryCount);
        }
    };
}

function nextProject() {
    index = (index + 1) % projects.length;
    updateDesktop();
}

function prevProject() {
    index = (index - 1 + projects.length) % projects.length;
    updateDesktop();
}

function openGallery(projectId, count) {
    gallery = [];
    for (let i = 1; i <= count; i++) {
        gallery.push(`/projects/project${projectId}/img${i}.jpg`);
    }
    galleryIndex = 0;
    document.getElementById("lightbox").style.display = "flex";
    updateGallery();
}

function updateGallery() {
    const img = document.getElementById("lightbox-img");
    img.classList.remove("visible");

    setTimeout(() => {
        img.src = gallery[galleryIndex];
        document.getElementById("lightbox-counter").innerText =
            `${galleryIndex + 1} / ${gallery.length}`;
        img.classList.add("visible");
    }, 120);
}

function nextImage() {
    galleryIndex = (galleryIndex + 1) % gallery.length;
    updateGallery();
}

function prevImage() {
    galleryIndex = (galleryIndex - 1 + gallery.length) % gallery.length;
    updateGallery();
}

function closeGallery() {
    document.getElementById("lightbox").style.display = "none";
}

document.getElementById("lightbox").addEventListener("click", (e) => {
    if (e.target.id === "lightbox") closeGallery();
});

document.addEventListener("keydown", (e) => {
    if (document.getElementById("lightbox").style.display === "flex") {
        if (e.key === "ArrowRight") nextImage();
        if (e.key === "ArrowLeft") prevImage();
        if (e.key === "Escape") closeGallery();
        return;
    }

    if (window.innerWidth >= 768) {
        if (e.key === "ArrowRight") nextProject();
        if (e.key === "ArrowLeft") prevProject();
    }
});

/* SWIPE (UNCHANGED) */
let startX = 0;

document.addEventListener("touchstart", e => {
    startX = e.touches[0].clientX;
});

document.addEventListener("touchend", e => {
    let endX = e.changedTouches[0].clientX;

    if (Math.abs(startX - endX) > 50) {
        if (document.getElementById("lightbox").style.display === "flex") {
            if (startX > endX) nextImage();
            else prevImage();
        } else {
            if (startX > endX) nextProject();
            else prevProject();
        }
    }
});

/* ✅ FIXED renderMobile (no extra script tag) */
function renderMobile() {
    const container = document.getElementById("mobile-image-stack");

    container.innerHTML = "";

    projects.forEach(project => {
        const wrapper = document.createElement("div");
        const img = document.createElement("img");

        img.src = project.listImage;
        img.className = "w-full h-auto block";

        wrapper.appendChild(img);
        container.appendChild(wrapper);
    });
}

window.onload = init;

</script>
