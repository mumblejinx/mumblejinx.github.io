<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Projects - Jake Galm</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body {
    background: black;
    color: white;
    margin: 0;
    overflow-x: hidden;
}

/* ===== SCROLL INDICATOR ===== */
@keyframes bounce-scroll {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
}
.animate-bounce-scroll {
    animation: bounce-scroll 2s infinite ease-in-out;
}

/* ===== IMAGE FEEL ===== */
#project-img {
    transition: transform 6s ease, opacity 0.6s ease;
}
.image-active {
    transform: scale(1.03);
}
#image-container:hover #project-img {
    transform: scale(1.06);
}

/* ===== LIGHTBOX ===== */
#lightbox {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.95);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 1000;
}

/* CLOSE BUTTON */
#close-lightbox {
    position: absolute;
    top: 20px;
    right: 20px;
    font-size: 28px;
    cursor: pointer;
    opacity: 0.7;
}
#close-lightbox:hover {
    opacity: 1;
}

#lightbox img {
    max-width: 90vw;
    max-height: 85vh;
    object-fit: contain;
    opacity: 0;
    transition: opacity 0.5s ease;
}
#lightbox img.visible {
    opacity: 1;
}

.lightbox-arrow {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    font-size: 28px;
    padding: 12px;
    border: 1px solid #444;
    cursor: pointer;
    opacity: 0.6;
}
.lightbox-arrow:hover {
    opacity: 1;
}

#prev-img { left: 20px; }
#next-img { right: 20px; }

#lightbox-counter {
    position: absolute;
    bottom: 20px;
    font-size: 12px;
    color: #aaa;
    letter-spacing: 2px;
}

/* ===== FADE ===== */
body {
    animation: fadeIn 1.2s ease;
}
@keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
}
</style>
</head>

<body>

<!-- DESKTOP -->
<div class="hidden md:flex min-h-screen px-6 lg:px-12 py-8 gap-10">

    <div class="w-1/2 flex flex-col items-center justify-between h-[85vh]">

        <div id="image-container"
             class="w-full flex items-center justify-center max-h-[70vh] bg-gray-900 overflow-hidden cursor-pointer">
            <img id="project-img" class="max-w-full max-h-full object-contain">
        </div>

        <div class="flex items-center gap-8 mt-6">
            <button onclick="prevProject()">←</button>
            <span id="counter"></span>
            <button onclick="nextProject()">→</button>
        </div>
    </div>

    <div class="w-1/2 overflow-y-auto">
        <h1 id="title" class="text-[#8bc34a] text-4xl mb-6 uppercase"></h1>
        <div id="description"></div>
    </div>

</div>

<!-- MOBILE -->
<div class="md:hidden px-4 py-6 pb-24">

    <div id="mobile-stack" class="flex flex-col gap-20"></div>

    <div class="mt-16 border-t border-gray-800 pt-8">
        <h1 class="text-[#8bc34a] text-3xl font-bold mb-4 uppercase">
            Projects
        </h1>
    </div>

    <!-- SCROLL INDICATOR -->
    <div id="scroll-indicator" class="fixed bottom-4 left-6 z-40 pointer-events-none">
        <div class="flex items-center gap-2 text-white font-bold text-xs tracking-widest animate-bounce-scroll">
            ▼ SCROLL
        </div>
    </div>

</div>

<!-- LIGHTBOX -->
<div id="lightbox">

    <div id="close-lightbox" onclick="closeGallery()">✕</div>

    <div id="prev-img" class="lightbox-arrow" onclick="prevImage()">←</div>
    <div id="next-img" class="lightbox-arrow" onclick="nextImage()">→</div>

    <img id="lightbox-img">
    <div id="lightbox-counter"></div>

</div>

<script>

/* DATA */
const projects = [
    { id:0, title:"PROJECTS OVERVIEW", description:"Overview", listImage:"/subsections/projects/list/overview.jpg", galleryCount:0 },
    ...Array.from({ length: 10 }, (_, i) => ({
        id: i + 1,
        title: `PROJECT ${i + 1}`,
        description: `Project ${i + 1}`,
        listImage: `/subsections/projects/list/project-${i + 1}.jpg`,
        galleryCount: 3
    }))
];

let index = 0;
let gallery = [];
let galleryIndex = 0;

function init() {
    updateDesktop();
    renderMobile();

    window.addEventListener('scroll', () => {
        const el = document.getElementById('scroll-indicator');
        el.style.opacity = window.scrollY > 100 ? '0' : '1';
    });
}

function updateDesktop() {
    const p = projects[index];
    document.getElementById("title").innerText = p.title;
    document.getElementById("description").innerText = p.description;
    document.getElementById("counter").innerText = p.id === 0 ? "OVERVIEW" : `${p.id}/10`;

    const img = document.getElementById("project-img");
    img.style.opacity = 0;
    setTimeout(() => {
        img.src = p.listImage;
        img.style.opacity = 1;
    }, 200);

    document.getElementById("image-container").onclick = () => {
        if (p.galleryCount > 0) openGallery(p.id, p.galleryCount);
    };
}

function nextProject(){ index=(index+1)%projects.length; updateDesktop(); }
function prevProject(){ index=(index-1+projects.length)%projects.length; updateDesktop(); }

function openGallery(id,count){
    gallery = [];
    for(let i=1;i<=count;i++){
        gallery.push(`/projects/project${id}/img${i}.jpg`);
    }
    galleryIndex=0;
    document.getElementById("lightbox").style.display="flex";
    updateGallery();
}

function updateGallery(){
    const img=document.getElementById("lightbox-img");
    img.classList.remove("visible");
    setTimeout(()=>{
        img.src=gallery[galleryIndex];
        document.getElementById("lightbox-counter").innerText=`${galleryIndex+1}/${gallery.length}`;
        img.classList.add("visible");
    },100);
}

function nextImage(){ galleryIndex=(galleryIndex+1)%gallery.length; updateGallery(); }
function prevImage(){ galleryIndex=(galleryIndex-1+gallery.length)%gallery.length; updateGallery(); }
function closeGallery(){ document.getElementById("lightbox").style.display="none"; }

window.onload=init;

</script>

</body>
</html>
