<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Projects - Jake Galm</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body {
    background: black;
    color: white;
    margin: 0;
    overflow-x: hidden;
}

/* LIGHTBOX */
#lightbox {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.95);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 1000;
}

#lightbox img {
    max-width: 90vw;
    max-height: 85vh;
    object-fit: contain;
}

</style>
</head>

<body>

<!-- ========================= -->
<!-- DESKTOP / TABLET -->
<!-- ========================= -->
<div id="desktop" class="hidden md:flex min-h-screen px-6 lg:px-12 py-8 gap-10">

    <!-- LEFT -->
    <div class="w-1/2 flex flex-col items-center justify-between h-[85vh]">

        <div id="image-container"
             class="w-full flex items-center justify-center max-h-[70vh] bg-gray-900 cursor-pointer">

            <img id="project-img"
                 class="max-w-full max-h-full object-contain"
                 src="">
        </div>

        <div class="flex items-center gap-8 mt-6">

            <button onclick="prevProject()" class="p-3 border border-gray-700 rounded-full">←</button>

            <span id="counter" class="text-gray-400 text-sm tracking-widest"></span>

            <button onclick="nextProject()" class="p-3 border border-gray-700 rounded-full">→</button>

        </div>
    </div>

    <!-- RIGHT -->
    <div class="w-1/2 overflow-y-auto max-h-[85vh] pr-4">

        <h1 id="title" class="text-[#8bc34a] text-4xl mb-6"></h1>
        <div id="description" class="text-gray-300 space-y-4"></div>

    </div>

</div>


<!-- ========================= -->
<!-- MOBILE -->
<!-- ========================= -->
<div class="md:hidden px-4 py-6 pb-24">

    <div id="mobile-stack" class="flex flex-col gap-16"></div>

</div>


<!-- ========================= -->
<!-- LIGHTBOX -->
<!-- ========================= -->
<div id="lightbox" onclick="closeLightbox()">

    <img id="lightbox-img">

</div>


<script>

/* =========================
DATA
========================= */

const projects = [
{
    id: 0,
    title: "PROJECTS OVERVIEW",
    description: `<p>Welcome to the Projects section.</p>`,
    listImage: "/subsections/projects/list/overview.jpg",
    gallery: []
},
...Array.from({ length: 10 }, (_, i) => ({
    id: i + 1,
    title: `PROJECT ${i + 1}`,
    description: `<p>Project ${i + 1}</p>`,
    listImage: `/subsections/projects/list/project-${i + 1}.jpg`,
    gallery: Array.from({ length: 5 }, (_, j) => ({
        full: `/subsections/projects/project-${i + 1}/img-${j + 1}.jpg`
    }))
}))
];


/* =========================
STATE
========================= */

let index = 0;
let lightboxIndex = 0;
let activeGallery = [];


/* =========================
INIT
========================= */

function init() {
    updateDesktop();
    renderMobile();
}


/* =========================
DESKTOP VIEW
========================= */

function updateDesktop() {

    const project = projects[index];

    title.innerHTML = project.title;
    description.innerHTML = project.description;

    counter.innerText =
        project.id === 0 ? "OVERVIEW" : `${project.id} / 10`;

    projectImg.src = project.listImage;

    imageContainer.onclick = () => {
        if (project.gallery.length) openLightbox(project.gallery);
    };
}


/* =========================
NAV
========================= */

function nextProject() {
    index = (index + 1) % projects.length;
    updateDesktop();
}

function prevProject() {
    index = (index - 1 + projects.length) % projects.length;
    updateDesktop();
}


/* =========================
LIGHTBOX
========================= */

function openLightbox(gallery) {
    activeGallery = gallery;
    lightboxIndex = 0;

    lightbox.style.display = "flex";
    updateLightbox();
}

function updateLightbox() {
    lightboxImg.src = activeGallery[lightboxIndex].full;
}

function closeLightbox() {
    lightbox.style.display = "none";
}

function nextImage() {
    lightboxIndex = (lightboxIndex + 1) % activeGallery.length;
    updateLightbox();
}

function prevImage() {
    lightboxIndex = (lightboxIndex - 1 + activeGallery.length) % activeGallery.length;
    updateLightbox();
}


/* =========================
KEYBOARD
========================= */

document.addEventListener("keydown", (e) => {

    if (lightbox.style.display === "flex") {
        if (e.key === "ArrowRight") nextImage();
        if (e.key === "ArrowLeft") prevImage();
        if (e.key === "Escape") closeLightbox();
        return;
    }

    if (window.innerWidth >= 768) {
        if (e.key === "ArrowRight") nextProject();
        if (e.key === "ArrowLeft") prevProject();
    }
});


/* =========================
SWIPE (TABLET)
========================= */

let startX = 0;

document.addEventListener("touchstart", e => {
    startX = e.touches[0].clientX;
});

document.addEventListener("touchend", e => {
    let endX = e.changedTouches[0].clientX;

    if (Math.abs(startX - endX) > 50) {
        if (startX > endX) nextProject();
        else prevProject();
    }
});


/* =========================
MOBILE
========================= */

function renderMobile() {

    const container = document.getElementById("mobile-stack");

    projects.forEach(project => {

        const div = document.createElement("div");

        const img = document.createElement("img");

        img.src = project.listImage;
        img.className = "w-full h-auto";

        div.appendChild(img);
        container.appendChild(div);
    });
}


window.onload = init;

</script>

</body>
</html>
