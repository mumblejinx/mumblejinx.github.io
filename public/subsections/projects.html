<style>
body {

/* IMAGE FEEL */
#project-img {
    transition: transform 6s ease, opacity 0.6s ease;
}
.image-active {
    transform: scale(1.03);
}
#image-container:hover #project-img {
    transform: scale(1.06);
}

/* MOBILE BOUNCE */
@keyframes bounce-scroll {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
}
.animate-bounce-scroll {
    animation: bounce-scroll 2s infinite ease-in-out;
}

/* PAGE FADE */
body {
    animation: fadeIn 1.2s ease;
}
@keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
}
</style>

/* =========================
   🚫 DO NOT EDIT BELOW
   ========================= */

let index = 0;

function init() {
    updateDesktop();
    renderMobile();
}

function updateDesktop() {
    const project = projects[index];

    document.getElementById("title").innerHTML = project.title;
    document.getElementById("description").innerHTML = project.description;

    const counter = document.getElementById("counter");
    counter.innerText = project.id === 0 ? "OVERVIEW" : `${project.id} / 10`;

    const img = document.getElementById("project-img");

    img.classList.remove("image-active");
    img.style.opacity = 0;

    setTimeout(() => {
        img.src = project.listImage;
        img.style.opacity = 1;
        img.classList.add("image-active");
    }, 200);

    document.getElementById("image-container").onclick = () => {
        if (project.galleryCount > 0) {
            openGallery(project.id, project.galleryCount);
        }
    };
}

function nextProject() {
    index = (index + 1) % projects.length;
    updateDesktop();
}

function prevProject() {
    index = (index - 1 + projects.length) % projects.length;
    updateDesktop();
}

function openGallery(projectId, count) {
    const images = [];

    for (let i = 1; i <= count; i++) {
        images.push({
            full: `/projects/project${projectId}/img${i}.jpg`,
            description: `Project ${projectId} - Image ${i}`
        });
    }

    window.parent.postMessage({
        type: 'OPEN_LIGHTBOX',
        images: images,
        index: 0
    }, '*');
}

/* MOBILE */

function renderMobile() {
    const container = document.getElementById("mobile-image-stack");
    container.innerHTML = "";

    projects.forEach(project => {
        const wrapper = document.createElement("div");
        const img = document.createElement("img");

        img.src = project.listImage;
        img.className = "w-full h-auto block";

        wrapper.appendChild(img);
        container.appendChild(wrapper);
    });

    const overview = projects[0];

    document.getElementById("mobile-title").innerHTML = overview.title;
    document.getElementById("mobile-description").innerHTML = overview.description;
}

/* SCROLL INDICATOR */

window.addEventListener("scroll", () => {
    const indicator = document.getElementById("scroll-indicator");
    if (!indicator) return;

    indicator.style.opacity = window.scrollY > 50 ? "0" : "1";
});

window.onload = init;
