/* =========================

   ========================= */

let index = 0;

function init() {
    updateDesktop();
    renderMobile();
}

function updateDesktop() {
    const project = projects[index];

    document.getElementById("title").innerHTML = project.title;
    document.getElementById("description").innerHTML = project.description;

    const counter = document.getElementById("counter");
    counter.innerText = project.id === 0 ? "OVERVIEW" : `${project.id} / 10`;

    const img = document.getElementById("project-img");

    img.classList.remove("image-active");
    img.style.opacity = 0;

    setTimeout(() => {
        img.src = project.listImage;
        img.style.opacity = 1;
        img.classList.add("image-active");
    }, 200);

    const container = document.getElementById("image-container");
    container.style.cursor = (project.gallery && project.gallery.length > 0) ? "pointer" : "default";
    container.onclick = () => {
        if (project.gallery && project.gallery.length > 0) {
            openGallery(index);
        }
    };
}

function nextProject() {
    index = (index + 1) % projects.length;
    updateDesktop();
}

function prevProject() {
    index = (index - 1 + projects.length) % projects.length;
    updateDesktop();
}

function openGallery(projectIndex) {
    const project = projects[projectIndex];
    if (!project.gallery || project.gallery.length === 0) return;

    const images = project.gallery.map((path) => ({
        full: path,
        hideDescription: true
    }));

    window.parent.postMessage({
        type: 'OPEN_LIGHTBOX',
        images: images,
        index: 0
    }, '*');
}

/* MOBILE */

function renderMobile() {
    const container = document.getElementById("mobile-image-stack");
    container.innerHTML = "";

    projects.forEach(project => {
        const wrapper = document.createElement("div");
        const img = document.createElement("img");

        img.src = project.listImage;
        img.className = "w-full h-auto block";

        wrapper.appendChild(img);
        container.appendChild(wrapper);
    });

    const overview = projects[0];

    document.getElementById("mobile-title").innerHTML = overview.title;
    document.getElementById("mobile-description").innerHTML = overview.description;
}

/* SCROLL INDICATOR */

window.addEventListener("scroll", () => {
    const indicator = document.getElementById("scroll-indicator");
    if (!indicator) return;

    indicator.style.opacity = window.scrollY > 50 ? "0" : "1";
});

window.onload = init;

</script>
