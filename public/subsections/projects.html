<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Projects - Jake Galm</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body {
    background: black;
    color: white;
    margin: 0;
    overflow-x: hidden;
}

/* Smooth scroll feel */
html {
    scroll-behavior: smooth;
}
</style>
</head>

<body>

<!-- ========================= -->
<!-- DESKTOP + TABLET LAYOUT -->
<!-- ========================= -->
<div class="hidden md:flex min-h-screen px-6 lg:px-12 py-8 gap-10">

    <!-- LEFT: IMAGE + NAV -->
    <div class="w-1/2 flex flex-col items-center justify-between h-[85vh]">

        <!-- IMAGE -->
        <div id="image-container"
             class="w-full flex items-center justify-center max-h-[70vh] bg-gray-900 overflow-hidden">

            <img id="project-img"
                 class="max-w-full max-h-full object-contain transition-all duration-500"
                 src="">
        </div>

        <!-- NAV -->
        <div class="flex items-center gap-8 mt-6">

            <button onclick="prevProject()"
                class="p-3 rounded-full border border-gray-700 hover:border-[#8bc34a] transition">
                ←
            </button>

            <span id="counter"
                class="text-gray-400 text-sm tracking-widest min-w-[80px] text-center"></span>

            <button onclick="nextProject()"
                class="p-3 rounded-full border border-gray-700 hover:border-[#8bc34a] transition">
                →
            </button>

        </div>
    </div>

    <!-- RIGHT: TEXT -->
    <div class="w-1/2 flex flex-col justify-start max-h-[85vh] overflow-y-auto pr-4">

        <h1 id="title"
            class="text-[#8bc34a] text-4xl font-bold mb-6 uppercase"></h1>

        <div id="description"
             class="text-gray-300 text-lg leading-relaxed space-y-4"></div>

    </div>

</div>


<!-- ========================= -->
<!-- MOBILE LAYOUT -->
<!-- ========================= -->
<div class="md:hidden px-4 py-6 pb-24">

    <!-- IMAGE STACK -->
    <div id="mobile-stack" class="flex flex-col gap-12">
        <!-- Images injected -->
    </div>

    <!-- DESCRIPTION -->
    <div class="mt-16 border-t border-gray-800 pt-8">

        <h1 class="text-[#8bc34a] text-3xl font-bold mb-4 uppercase">
            Projects
        </h1>

        <p class="text-gray-400 leading-relaxed">
            Scroll through a selection of projects. Each image represents a body of work.
        </p>

    </div>

</div>


<script>

/* =========================
   DATA
========================= */

const projects = [
{
    id: 0,
    title: "PROJECTS OVERVIEW",
    description: `
        <p>Welcome to the Projects section.</p>
        <p>Use navigation arrows to explore different bodies of work.</p>
    `,
    listImage: "/subsections/projects/list/overview.jpg",
},
...Array.from({ length: 10 }, (_, i) => ({
    id: i + 1,
    title: `PROJECT ${i + 1}`,
    description: `
        <p>This is Project ${i + 1}.</p>
        <p>Click image to view full gallery.</p>
    `,
    listImage: `/subsections/projects/list/project-${i + 1}.jpg`,
}))
];


/* =========================
   STATE
========================= */

let index = 0;


/* =========================
   INIT
========================= */

function init() {
    updateDesktop();
    renderMobile();
}


/* =========================
   DESKTOP
========================= */

function updateDesktop() {

    const project = projects[index];

    document.getElementById("title").innerHTML = project.title;
    document.getElementById("description").innerHTML = project.description;

    const counter = document.getElementById("counter");
    counter.innerText = project.id === 0 ? "OVERVIEW" : `${project.id} / 10`;

    const img = document.getElementById("project-img");
    img.src = project.listImage;
}


/* =========================
   NAVIGATION
========================= */

function nextProject() {
    index = (index + 1) % projects.length;
    updateDesktop();
}

function prevProject() {
    index = (index - 1 + projects.length) % projects.length;
    updateDesktop();
}


/* =========================
   MOBILE
========================= */

function renderMobile() {

    const container = document.getElementById("mobile-stack");

    projects.forEach(project => {

        const wrapper = document.createElement("div");

        wrapper.className = "w-full";

        const img = document.createElement("img");

        img.src = project.listImage;
        img.className = "w-full h-auto block";

        wrapper.appendChild(img);
        container.appendChild(wrapper);
    });
}


/* =========================
   KEYBOARD NAV
========================= */

document.addEventListener("keydown", (e) => {
    if (window.innerWidth < 768) return;

    if (e.key === "ArrowRight") nextProject();
    if (e.key === "ArrowLeft") prevProject();
});


window.onload = init;

</script>

</body>
</html>
