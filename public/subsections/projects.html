<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Projects - Jake Galm</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body {
    background: black;
    color: white;
    margin: 0;
    overflow-x: hidden;
}

/* ===== IMAGE FEEL ===== */
#project-img {
    transition: transform 6s ease, opacity 0.6s ease;
}

.image-active {
    transform: scale(1.03);
}

#image-container:hover #project-img {
    transform: scale(1.06);
}

/* ===== LIGHTBOX ===== */
#lightbox {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.95);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 1000;
}

#lightbox img {
    max-width: 90vw;
    max-height: 85vh;
    object-fit: contain;
    opacity: 0;
    transition: opacity 0.5s ease;
}

#lightbox img.visible {
    opacity: 1;
}

.lightbox-arrow {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    font-size: 28px;
    padding: 12px;
    border: 1px solid #444;
    cursor: pointer;
    opacity: 0.6;
    transition: opacity 0.3s ease, transform 0.3s ease;
}

.lightbox-arrow:hover {
    opacity: 1;
    transform: translateY(-50%) scale(1.1);
}

#prev-img { left: 20px; }
#next-img { right: 20px; }

#lightbox-counter {
    position: absolute;
    bottom: 20px;
    font-size: 12px;
    color: #aaa;
    letter-spacing: 2px;
}

/* ✅ CLOSE BUTTON */
#lightbox-close {
    position: absolute;
    top: 20px;
    right: 20px;
    font-size: 26px;
    padding: 10px;
    border: 1px solid #444;
    cursor: pointer;
    opacity: 0.7;
    transition: 0.3s;
}

#lightbox-close:hover {
    opacity: 1;
    transform: scale(1.1);
}

/* ===== MOBILE BOUNCE ===== */
#scroll-indicator {
    position: fixed;
    bottom: 90px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 12px;
    letter-spacing: 2px;
    color: #aaa;
    animation: bounce 1.6s infinite;
}

@keyframes bounce {
    0%, 100% { transform: translate(-50%, 0); }
    50% { transform: translate(-50%, 10px); }
}

/* ===== PAGE FADE IN ===== */
body {
    animation: fadeIn 1.2s ease;
}

@keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
}
</style>
</head>

<body>

<!-- DESKTOP + TABLET -->
<div class="hidden md:flex min-h-screen px-6 lg:px-12 py-8 gap-10">

    <div class="w-1/2 flex flex-col items-center justify-between h-[85vh]">

        <div id="image-container"
             class="w-full flex items-center justify-center max-h-[70vh] bg-gray-900 overflow-hidden cursor-pointer">

            <img id="project-img"
                 class="max-w-full max-h-full object-contain"
                 src="">
        </div>

        <div class="flex items-center gap-8 mt-6">

            <button onclick="prevProject()" class="p-3 border border-gray-700 rounded-full">
                ←
            </button>

            <span id="counter"
                class="text-gray-400 text-sm tracking-widest min-w-[80px] text-center"></span>

            <button onclick="nextProject()" class="p-3 border border-gray-700 rounded-full">
                →
            </button>

        </div>
    </div>

    <div class="w-1/2 flex flex-col justify-start max-h-[85vh] overflow-y-auto pr-4">

        <h1 id="title"
            class="text-[#8bc34a] text-4xl font-bold mb-6 uppercase"></h1>

        <div id="description"
             class="text-gray-300 text-lg leading-relaxed space-y-4"></div>

    </div>

</div>


<!-- MOBILE -->
<div class="md:hidden px-4 py-6 pb-24">

    <div id="mobile-stack" class="flex flex-col gap-20"></div>

    <!-- ✅ SCROLL INDICATOR -->
    <div id="scroll-indicator">SCROLL ↓</div>

    <div class="mt-16 border-t border-gray-800 pt-8">

        <h1 class="text-[#8bc34a] text-3xl font-bold mb-4 uppercase">
            Projects
        </h1>

        <p class="text-gray-400 leading-relaxed">
            Scroll through a selection of projects. Each image represents a body of work.
        </p>

    </div>

</div>


<!-- LIGHTBOX -->
<div id="lightbox">

    <div id="lightbox-close" onclick="closeGallery()">✕</div>

    <div id="prev-img" class="lightbox-arrow" onclick="prevImage()">←</div>
    <div id="next-img" class="lightbox-arrow" onclick="nextImage()">→</div>

    <img id="lightbox-img">

    <div id="lightbox-counter"></div>

</div>


<script>

/* =========================
DATA (UNCHANGED)
========================= */

const projects = [
{
    id: 0,
    title: "PROJECTS OVERVIEW",
    description: `
        <p>Welcome to the Projects section.</p>
        <p>Use navigation arrows to explore different bodies of work.</p>
    `,
    listImage: "/subsections/projects/list/overview.jpg",
    galleryCount: 0
},
...Array.from({ length: 10 }, (_, i) => ({
    id: i + 1,
    title: `PROJECT ${i + 1}`,
    description: `
        <p>This is Project ${i + 1}.</p>
        <p>Click image to view full gallery.</p>
    `,
    listImage: `/subsections/projects/list/project-${i + 1}.jpg`,
    galleryCount: 3
}))
];

/* =========================
STATE + LOGIC (UNCHANGED)
========================= */

let index = 0;
let gallery = [];
let galleryIndex = 0;

function init() {
    updateDesktop();
    renderMobile();
}

function updateDesktop() {
    const project = projects[index];

    document.getElementById("title").innerHTML = project.title;
    document.getElementById("description").innerHTML = project.description;

    const counter = document.getElementById("counter");
    counter.innerText = project.id === 0 ? "OVERVIEW" : `${project.id} / 10`;

    const img = document.getElementById("project-img");

    img.classList.remove("image-active");
    img.style.opacity = 0;

    setTimeout(() => {
        img.src = project.listImage;
        img.style.opacity = 1;
        img.classList.add("image-active");
    }, 200);

    document.getElementById("image-container").onclick = () => {
        if (project.galleryCount > 0) {
            openGallery(project.id, project.galleryCount);
        }
    };
}

function nextProject() {
    index = (index + 1) % projects.length;
    updateDesktop();
}

function prevProject() {
    index = (index - 1 + projects.length) % projects.length;
    updateDesktop();
}

function openGallery(projectId, count) {
    gallery = [];
    for (let i = 1; i <= count; i++) {
        gallery.push(`/projects/project${projectId}/img${i}.jpg`);
    }
    galleryIndex = 0;
    document.getElementById("lightbox").style.display = "flex";
    updateGallery();
}

function updateGallery() {
    const img = document.getElementById("lightbox-img");
    img.classList.remove("visible");

    setTimeout(() => {
        img.src = gallery[galleryIndex];
        document.getElementById("lightbox-counter").innerText =
            `${galleryIndex + 1} / ${gallery.length}`;
        img.classList.add("visible");
    }, 120);
}

function nextImage() {
    galleryIndex = (galleryIndex + 1) % gallery.length;
    updateGallery();
}

function prevImage() {
    galleryIndex = (galleryIndex - 1 + gallery.length) % gallery.length;
    updateGallery();
}

function closeGallery() {
    document.getElementById("lightbox").style.display = "none";
}

document.getElementById("lightbox").addEventListener("click", (e) => {
    if (e.target.id === "lightbox") closeGallery();
});

document.addEventListener("keydown", (e) => {
    if (document.getElementById("lightbox").style.display === "flex") {
        if (e.key === "ArrowRight") nextImage();
        if (e.key === "ArrowLeft") prevImage();
        if (e.key === "Escape") closeGallery();
        return;
    }

    if (window.innerWidth >= 768) {
        if (e.key === "ArrowRight") nextProject();
        if (e.key === "ArrowLeft") prevProject();
    }
});

/* SWIPE (UNCHANGED) */
let startX = 0;

document.addEventListener("touchstart", e => {
    startX = e.touches[0].clientX;
});

document.addEventListener("touchend", e => {
    let endX = e.changedTouches[0].clientX;

    if (Math.abs(startX - endX) > 50) {
        if (document.getElementById("lightbox").style.display === "flex") {
            if (startX > endX) nextImage();
            else prevImage();
        } else {
            if (startX > endX) nextProject();
            else prevProject();
        }
    }
});

function renderMobile() {
    const container = document.getElementById("mobile-stack");

    projects.forEach(project => {
        const wrapper = document.createElement("div");
        const img = document.createElement("img");

        img.src = project.listImage;
        img.className = "w-full h-auto block";

        wrapper.appendChild(img);
        container.appendChild(wrapper);
    });
}

window.onload = init;

</script>

</body>
</html>
