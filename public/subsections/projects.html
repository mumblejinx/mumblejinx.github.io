<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Projects</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-black text-white font-sans">

  <!-- DESKTOP GRID -->
  <div id="desktop-grid" class="hidden md:grid grid-cols-3 gap-4 p-6"></div>

  <!-- MOBILE STACK -->
  <div id="mobile-image-stack" class="flex flex-col gap-12 p-4 md:hidden"></div>

  <script>
    /* =========================
       PROJECT DATA
    ========================= */
    const projects = [
      {
        id: "project1",
        title: "Project One",
        description: "<p>Description for project one.</p>",
        listImage: "/projects/project1.jpg",
        galleryCount: 3
      },
      {
        id: "project2",
        title: "Project Two",
        description: "<p>Description for project two.</p>",
        listImage: "/projects/project2.jpg",
        galleryCount: 0
      },
      {
        id: "project3",
        title: "Project Three",
        description: "<p>Description for project three.</p>",
        listImage: "/projects/project3.jpg",
        galleryCount: 5
      }
    ];

    /* =========================
       LIGHTBOX TRIGGER
    ========================= */
    function openGallery(projectId, count) {
      const images = [];

      for (let i = 1; i <= count; i++) {
        images.push({
          full: `/projects/${projectId}/${i}.jpg`,
          description: ""
        });
      }

      window.parent.postMessage({
        type: "OPEN_LIGHTBOX",
        images,
        index: 0
      }, "*");
    }

    /* =========================
       DESKTOP RENDER
    ========================= */
    function renderDesktop() {
      const grid = document.getElementById("desktop-grid");
      grid.innerHTML = "";

      projects.forEach(project => {
        const wrapper = document.createElement("div");
        wrapper.className = "flex flex-col gap-3";

        const img = document.createElement("img");
        img.src = project.listImage;
        img.className = "w-full h-auto object-cover";

        if (project.galleryCount > 0) {
          img.style.cursor = "pointer";
          img.onclick = () => openGallery(project.id, project.galleryCount);
        }

        const title = document.createElement("h2");
        title.innerText = project.title;
        title.className = "text-[#8bc34a] text-lg font-bold uppercase";

        wrapper.appendChild(img);
        wrapper.appendChild(title);

        grid.appendChild(wrapper);
      });
    }

    /* =========================
       ✅ FIXED MOBILE RENDER
    ========================= */
    function renderMobile() {
      const container = document.getElementById("mobile-image-stack");
      container.innerHTML = "";

      projects.forEach(project => {

        const wrapper = document.createElement("div");
        wrapper.className = "flex flex-col gap-4";

        // IMAGE
        const img = document.createElement("img");
        img.src = project.listImage;
        img.className = "w-full h-auto block";

        // TITLE
        const title = document.createElement("h2");
        title.innerText = project.title;
        title.className = "text-[#8bc34a] text-xl font-bold uppercase tracking-tighter";

        // DESCRIPTION
        const desc = document.createElement("div");
        desc.innerHTML = project.description;
        desc.className = "text-gray-400 text-sm leading-relaxed space-y-3";

        // CLICK (lightbox)
        if (project.galleryCount > 0) {
          img.style.cursor = "pointer";
          img.onclick = () => openGallery(project.id, project.galleryCount);
        }

        wrapper.appendChild(img);
        wrapper.appendChild(title);
        wrapper.appendChild(desc);

        container.appendChild(wrapper);
      });
    }

    /* =========================
       INIT
    ========================= */
    function init() {
      renderDesktop();
      renderMobile();
    }

    init();
  </script>

</body>
</html>
