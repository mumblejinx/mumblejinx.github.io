<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Projects - Jake Galm</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body {
    background: black;
    color: white;
    margin: 0;
    overflow-x: hidden;
}

/* LIGHTBOX */
#lightbox {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.97);
    display: none;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    z-index: 1000;
}

#lightbox img {
    max-width: 90vw;
    max-height: 80vh;
    object-fit: contain;
    transition: opacity 0.3s ease;
}

.lightbox-ui {
    position: absolute;
    width: 100%;
    top: 0;
    left: 0;
    padding: 20px;
    display: flex;
    justify-content: space-between;
    pointer-events: none;
}

.lightbox-btn {
    pointer-events: all;
    cursor: pointer;
    font-size: 20px;
    border: 1px solid #444;
    padding: 10px 14px;
}

.lightbox-nav {
    position: absolute;
    top: 50%;
    width: 100%;
    display: flex;
    justify-content: space-between;
    transform: translateY(-50%);
    pointer-events: none;
}

.lightbox-nav button {
    pointer-events: all;
    font-size: 28px;
    padding: 12px;
    border: 1px solid #444;
}

#lightbox-counter {
    position: absolute;
    bottom: 20px;
    font-size: 12px;
    letter-spacing: 2px;
    color: #aaa;
}
</style>
</head>

<body>

<!-- DESKTOP / TABLET -->
<div class="hidden md:flex min-h-screen px-6 lg:px-12 py-8 gap-10">

    <div class="w-1/2 flex flex-col items-center justify-between h-[85vh]">

        <div id="image-container"
             class="w-full flex items-center justify-center max-h-[70vh] bg-gray-900 cursor-pointer">

            <img id="project-img"
                 class="max-w-full max-h-full object-contain transition duration-500 hover:scale-105">
        </div>

        <div class="flex items-center gap-8 mt-6">

            <button onclick="prevProject()" class="p-3 border border-gray-700 rounded-full">←</button>

            <span id="counter" class="text-gray-400 text-sm tracking-widest"></span>

            <button onclick="nextProject()" class="p-3 border border-gray-700 rounded-full">→</button>

        </div>
    </div>

    <div class="w-1/2 overflow-y-auto max-h-[85vh] pr-4">

        <h1 id="title" class="text-[#8bc34a] text-4xl mb-6"></h1>
        <div id="description" class="text-gray-300 space-y-4"></div>

    </div>

</div>


<!-- MOBILE -->
<div class="md:hidden px-4 py-6 pb-24">

    <div id="mobile-stack" class="flex flex-col gap-16"></div>

</div>


<!-- LIGHTBOX -->
<div id="lightbox">

    <div class="lightbox-ui">
        <button class="lightbox-btn" onclick="closeLightbox()">✕</button>
    </div>

    <div class="lightbox-nav">
        <button onclick="prevImage()">←</button>
        <button onclick="nextImage()">→</button>
    </div>

    <img id="lightbox-img">

    <div id="lightbox-counter"></div>

</div>


<script>

/* =========================
DATA (EASY TO EDIT)
========================= */

const projects = [

{
    id: 0,
    title: "PROJECTS OVERVIEW",
    description: `<p>Welcome to the Projects section.</p>`,
    listImage: "/subsections/projects/list/overview.jpg",
    gallery: []
},

{
    id: 1,
    title: "PROJECT 1",
    description: `<p>Description for project 1.</p>`,
    listImage: "/subsections/projects/list/project-1.jpg",
    gallery: [
        { full: "/subsections/projects/project-1/img-1.jpg" },
        { full: "/subsections/projects/project-1/img-2.jpg" },
        { full: "/subsections/projects/project-1/img-3.jpg" }
    ]
},

{
    id: 2,
    title: "PROJECT 2",
    description: `<p>Description for project 2.</p>`,
    listImage: "/subsections/projects/list/project-2.jpg",
    gallery: [
        { full: "/subsections/projects/project-2/img-1.jpg" },
        { full: "/subsections/projects/project-2/img-2.jpg" }
    ]
},

// DUPLICATE BLOCKS ABOVE FOR NEW PROJECTS

];


/* =========================
STATE
========================= */

let index = 0;
let activeGallery = [];
let lightboxIndex = 0;


/* =========================
INIT
========================= */

function init() {
    updateDesktop();
    renderMobile();
}


/* =========================
DESKTOP
========================= */

function updateDesktop() {

    const project = projects[index];

    title.innerHTML = project.title;
    description.innerHTML = project.description;

    counter.innerText =
        project.id === 0 ? "OVERVIEW" : `${project.id} / ${projects.length - 1}`;

    projectImg.src = project.listImage;

    imageContainer.onclick = () => {
        if (project.gallery.length) openLightbox(project.gallery);
    };
}


/* =========================
NAV
========================= */

function nextProject() {
    index = (index + 1) % projects.length;
    updateDesktop();
}

function prevProject() {
    index = (index - 1 + projects.length) % projects.length;
    updateDesktop();
}


/* =========================
LIGHTBOX
========================= */

function openLightbox(gallery) {
    activeGallery = gallery;
    lightboxIndex = 0;
    lightbox.style.display = "flex";
    updateLightbox();
}

function updateLightbox() {

    lightboxImg.style.opacity = 0;

    setTimeout(() => {
        lightboxImg.src = activeGallery[lightboxIndex].full;
        lightboxCounter.innerText =
            `${lightboxIndex + 1} / ${activeGallery.length}`;
        lightboxImg.style.opacity = 1;
    }, 150);
}

function closeLightbox() {
    lightbox.style.display = "none";
}

function nextImage() {
    lightboxIndex = (lightboxIndex + 1) % activeGallery.length;
    updateLightbox();
}

function prevImage() {
    lightboxIndex = (lightboxIndex - 1 + activeGallery.length) % activeGallery.length;
    updateLightbox();
}


/* =========================
KEYBOARD
========================= */

document.addEventListener("keydown", (e) => {

    if (lightbox.style.display === "flex") {
        if (e.key === "ArrowRight") nextImage();
        if (e.key === "ArrowLeft") prevImage();
        if (e.key === "Escape") closeLightbox();
        return;
    }

    if (window.innerWidth >= 768) {
        if (e.key === "ArrowRight") nextProject();
        if (e.key === "ArrowLeft") prevProject();
    }
});


/* =========================
SWIPE (PROJECT + LIGHTBOX)
========================= */

let startX = 0;

document.addEventListener("touchstart", e => {
    startX = e.touches[0].clientX;
});

document.addEventListener("touchend", e => {

    let endX = e.changedTouches[0].clientX;

    if (Math.abs(startX - endX) > 50) {

        if (lightbox.style.display === "flex") {
            if (startX > endX) nextImage();
            else prevImage();
        } else {
            if (startX > endX) nextProject();
            else prevProject();
        }
    }
});


/* =========================
MOBILE STACK
========================= */

function renderMobile() {

    const container = document.getElementById("mobile-stack");

    projects.forEach(project => {

        const div = document.createElement("div");

        const img = document.createElement("img");

        img.src = project.listImage;
        img.className = "w-full h-auto";

        div.appendChild(img);
        container.appendChild(div);
    });
}


window.onload = init;

</script>

</body>
</html>
