<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meander - Work</title>

<style>
body {
    margin: 0;
    background-color: black;
    color: white;
    font-family: sans-serif;
}

/* Layout container */
.container {
    display: flex;
    height: 100vh;
}

/* Left side (image container) */
.left {
    width: 60%;
    height: 100vh;
    overflow: hidden;
}

/* Image styling */
.left img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* Right text */
.right {
    width: 40%;
    height: 100vh;
    overflow-y: auto;
    padding: 40px;
    box-sizing: border-box;
}

/* Typography */
h1 {
    color: #8bc34a;
    margin-top: 0;
}

p {
    line-height: 1.5;
}

/* Mobile layout */
@media (max-width: 768px) {

    .container {
        display: block;
        height: auto;
    }

    .left {
        width: 100%;
        height: auto;
    }

    .left img {
        width: 100%;
        height: auto;
        object-fit: contain;
    }

    .right {
        width: 100%;
        height: auto;
        padding: 20px;
    }
}
</style>
</head>

<body>

<div class="container">

    <div class="left">
        <img src="public/subsections/meander/meandernew.jpg" alt="Meander Image">
    </div>

    <div class="right">
        <h1>MEANDER</h1>
        <p>This is the MEANDER subsection of the WORK section.</p>
        <p>Placeholder content for experimental and personal work.</p>
    </div>

</div>

</body>
</html>
