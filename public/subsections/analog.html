<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analog - Work</title>

    <style>
        body {
            background-color: black;
            color: white;
            font-family: sans-serif;
            padding: 20px;
        }

        h1 { color: #8bc34a; }

        /* =========================
           GALLERY GRID
        ========================= */
        #gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 16px;
            margin-top: 30px;
        }

        /* =========================
           THUMBNAIL FADE-IN (AFTER LOAD)
        ========================= */
        .thumb-img {
            width: 100%;
            height: auto;

            opacity: 0;
            transform: translateY(10px);

            transition:
                opacity 0.8s ease,
                transform 0.8s ease;
        }

        .thumb-img.visible {
            opacity: 1;
            transform: translateY(0);
        }
    </style>
</head>

<body>

    <h1>ANALOG</h1>

    <p>This is the ANALOG subsection of the WORK section.</p>
    <p>Placeholder content for analog photography and art.</p>


    <!-- =========================
         GALLERY CONTAINER
    ========================= -->
    <div id="gallery"></div>


    <script>

    /* =========================
       CONTENT (EDIT THIS)
    ========================= */

    const title = "ANALOG";
        
    const description = `
        <p>This is the ANALOG subsection. Placeholder content for analog photography and art.</p>
        <p>The layout is designed to showcase 21 pieces of work in a clean, professional grid on desktop and a smooth scrolling experience on mobile.</p>
        <p>Easily swap these images by updating the array in the script section of this file.</p>
    `;

    const images = Array.from({ length: 21 }, (_, i) => {
        return {
            thumb: `/subsections/analog/analog_thumb/analog-${i}.jpg`,
            full: `/subsections/analog/analog_full/analog-${i}.jpg`,
            description: `This is a detailed description for Analog piece #${i + 1}.`
        };
    });


    /* =========================
       BUILD GALLERY
    ========================= */

    function buildGallery() {

        const gallery = document.getElementById("gallery");

        images.forEach((item, i) => {

            const img = document.createElement("img");

            img.src = item.thumb;
            img.classList.add("thumb-img");

            /* FADE IN AFTER IMAGE LOAD */
            img.onload = () => {
                setTimeout(() => {
                    img.classList.add("visible");
                }, i * 100); // stagger timing
            };

            /* OPTIONAL: future lightbox hook */
            img.onclick = () => {
                console.log("Clicked image", i);
            };

            gallery.appendChild(img);

        });
    }


    /* =========================
       INIT
    ========================= */

    window.onload = buildGallery;

    </script>

</body>
</html>
