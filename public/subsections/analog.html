<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Analog - Work</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap');
        
        body {
            background-color: black;
            color: white;
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #000; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #444; }

        @keyframes bounce-scroll {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        .animate-bounce-scroll {
            animation: bounce-scroll 2s infinite ease-in-out;
        }

        /* FADE-IN SYSTEM */
        .thumb-img {
            opacity: 0;
            transition: opacity 0.8s ease;
        }
        .thumb-img.visible {
            opacity: 1;
        }

        .h-dvh-safe { height: 100vh; height: 100dvh; }
        .min-h-dvh-safe { min-height: 100vh; min-height: 100dvh; }
    </style>
</head>

<body class="bg-black">

<!-- DESKTOP -->
<div id="desktop-layout" class="hidden lg:flex flex-row p-8 pb-0 gap-8 h-dvh-safe max-w-[1600px] mx-auto w-full">

    <!-- FIXED IMAGE GRID -->
    <div class="w-3/5 h-full flex items-center justify-center">
        <div id="thumbnail-grid" class="grid grid-cols-9 gap-2 w-full max-w-fit"></div>
    </div>

    <!-- SCROLLABLE TEXT -->
    <div class="w-2/5 h-full overflow-y-auto pr-4">
        <h1 id="desktop-title" class="text-[#8bc34a] text-4xl font-bold mb-6 uppercase tracking-tighter"></h1>

        <div id="desktop-description"
             class="text-gray-300 text-lg leading-relaxed space-y-4 pb-20">
        </div>
    </div>

</div>

<!-- MOBILE -->
<div id="mobile-layout" class="lg:hidden flex flex-col min-h-dvh-safe p-4 pb-24">

    <div id="mobile-image-stack" class="flex flex-col gap-4 mb-12"></div>

    <div class="mt-8 border-t border-gray-800 pt-8">
        <h1 id="mobile-title" class="text-[#8bc34a] text-3xl font-bold mb-4 uppercase tracking-tighter"></h1>
        <div id="mobile-description" class="text-gray-400 text-base leading-relaxed space-y-4"></div>
    </div>

    <div id="scroll-indicator" class="fixed bottom-4 left-6 z-40 pointer-events-none">
        <div class="flex items-center gap-2 text-white font-bold text-xs tracking-widest animate-bounce-scroll">
            <span>▼ SCROLL</span>
        </div>
    </div>

</div>

<script>

const title = "ANALOG / アナログ";

const description = `
    <p>I learned to draw by copying — Walter Lantz instruction books, Marvel comics, replicating the work I liked in black and white. I had decided not to work in color in the beginning, I thought I needed to master black and white first. I didn’t consider what I was doing real art at the time, and I didn’t think I was going to become what I understood a real artist to be. My working theory at the time was that real artists drew from imagination, without references. I couldn’t do that, and I didn’t think I ever would.</p>

    <p>In my twenties I was studying filmmaking, working toward directing. The financial reality of what that path actually required — and the degree to which it depends on organizing other people — made me rethink it. When I got the opportunity to study abroad in the Netherlands for six months, I made a decision: I was going to use that time to start making my own work, the way I believed it needed to be made. I loaded up on paper and color pencils.</p>

    <p>The school’s dorms were full so they put me up in an apartment above a restaurant, away from campus. A lot of nights I just holed up and drew. I started by trying to recall everything I loved about my favorite artists and mix it together from memory. Then I would look at what I’d made and find the parts that felt like me — and push further in that direction. My art practice has grown since this time when I was a self taught artist. I will use references now when I think the work calls for it. The pieces I care most about are from imagination — but I no longer think that’s what makes them real art.</p>

	<p>私は模写を通して絵を学びました。絵の描き方の教本やマーベル・コミックスを参考にして、好きだった作品を白黒で再現していました。最初はカラーでは制作しないと決めていて、まず白黒を習得する必要があると思っていたからです。当時、自分がやっていることを本当のアートだとは考えていませんでしたし、自分がいわゆる「本物のアーティスト」になるとも思っていませんでした。その頃の私の考えでは、本物のアーティストとは、資料に頼らず想像だけで描ける人のことでした。私にはそれができず、この先もできるようにはならないと思っていました。</p>

	<p>20代の頃、私は映画制作を学び、監督を目指していました。でも、その道に実際どれだけのお金が必要なのか、そしてどれほど他人をまとめ動かすことに依存しているのかを知って、考え直すようになりました。オランダへ半年間留学する機会を得たとき、ひとつ決断をしました。その時間を使って、自分が本来こう作るべきだと信じていた方法で、自分自身の作品を作り始めようと決めたのです。紙と色鉛筆をたくさん買い込みました。</p>

	<p>学校の寮が満室だったため、私はキャンパスから離れたレストランの上にあるアパートに滞在することになりました。多くの夜を、部屋にこもって絵を描いて過ごしました。最初は、自分が好きだったアーティストたちの魅力を記憶の中から呼び起こし、それらを混ぜ合わせるようにして描いていました。そして完成したものを見返し、その中で自分らしいと感じる部分を見つけて、さらにその方向へ進んでいきました。独学だったあの頃から、私の制作活動は成長してきました。今では、作品に必要だと思えば資料も使います。いちばん大切にしている作品は今でも想像から生まれたものですが、もうそれだけが本物のアートを決めるものだとは考えていません。</p>

`;

const images = [
    { thumb: '/subsections/analog/analog_thumb/analog-0.jpg',  full: '/subsections/analog/analog_full/analog-0.jpg',  name: 'Spun Gold',                                                                                          description: 'Color pencil with a black ink outline on paper' },
    { thumb: '/subsections/analog/analog_thumb/analog-1.jpg',  full: '/subsections/analog/analog_full/analog-1.jpg',  name: 'Cake',                                                                                               description: 'Color pencil with a black ink outline on paper' },
    { thumb: '/subsections/analog/analog_thumb/analog-2.jpg',  full: '/subsections/analog/analog_full/analog-2.jpg',  name: 'Message in a Bottle',                                                                                description: 'Color pencil with a black ink outline on paper' },
    { thumb: '/subsections/analog/analog_thumb/analog-3.jpg',  full: '/subsections/analog/analog_full/analog-3.jpg',  name: 'A Palindrome in the Heart of Pascal\'s Triangle',                                                    description: 'Color pencil with a black ink outline on paper' },
    { thumb: '/subsections/analog/analog_thumb/analog-4.jpg',  full: '/subsections/analog/analog_full/analog-4.jpg',  name: 'The Two Gypsies',                                                                                    description: 'Color pencil with a black ink outline on paper' },
    { thumb: '/subsections/analog/analog_thumb/analog-5.jpg',  full: '/subsections/analog/analog_full/analog-5.jpg',  name: 'Where e. e. cummings meets Parliament Funkadelic',                                                   description: 'Accent on the One. Color pencil with a black ink outline on paper' },
    { thumb: '/subsections/analog/analog_thumb/analog-6.jpg',  full: '/subsections/analog/analog_full/analog-6.jpg',  name: 'Follow the Feather',                                                                                 description: 'Color pencil with a black ink outline on paper' },
    { thumb: '/subsections/analog/analog_thumb/analog-7.jpg',  full: '/subsections/analog/analog_full/analog-7.jpg',  name: 'Candid Camera',                                                                                      description: 'Color pencil with a black ink outline on paper' },
    { thumb: '/subsections/analog/analog_thumb/analog-8.jpg',  full: '/subsections/analog/analog_full/analog-8.jpg',  name: 'Bout with a Trout II; Rock the Academy',                                                             description: 'Color pencil with a black ink outline on paper' },
    { thumb: '/subsections/analog/analog_thumb/analog-9.jpg',  full: '/subsections/analog/analog_full/analog-9.jpg',  name: 'The Snow White / Wicked Witch Memetic Cycle',                                                        description: 'Color pencil with a black ink outline on paper' },
    { thumb: '/subsections/analog/analog_thumb/analog-10.jpg', full: '/subsections/analog/analog_full/analog-10.jpg', name: 'Hey Lady',                                                                                           description: 'Color pencil with a black ink outline on paper' },
    { thumb: '/subsections/analog/analog_thumb/analog-11.jpg', full: '/subsections/analog/analog_full/analog-11.jpg', name: 'Dada Poem',                                                                                          description: 'Color pencil with a black ink outline on paper' },
    { thumb: '/subsections/analog/analog_thumb/analog-12.jpg', full: '/subsections/analog/analog_full/analog-12.jpg', name: 'Judy Canova',                                                                                        description: 'Color pencil with a black ink outline on paper' },
    { thumb: '/subsections/analog/analog_thumb/analog-13.jpg', full: '/subsections/analog/analog_full/analog-13.jpg', name: 'In Tune, On Time',                                                                                   description: 'Color pencil with a black ink outline on paper' },
    { thumb: '/subsections/analog/analog_thumb/analog-14.jpg', full: '/subsections/analog/analog_full/analog-14.jpg', name: 'Audiophile',                                                                                         description: 'Color pencil with a black ink outline on paper' },
    { thumb: '/subsections/analog/analog_thumb/analog-15.jpg', full: '/subsections/analog/analog_full/analog-15.jpg', name: 'At 11 O\'Clock is when my MusicBox Jock likes to Rock, She Wakes up the Whole Damn Block',           description: 'Color pencil with a black ink outline on paper' },
    { thumb: '/subsections/analog/analog_thumb/analog-16.jpg', full: '/subsections/analog/analog_full/analog-16.jpg', name: 'Freehand to the Clockwork Jukebox',                                                                  description: 'Color pencil with a black ink outline on paper' },
    { thumb: '/subsections/analog/analog_thumb/analog-17.jpg', full: '/subsections/analog/analog_full/analog-17.jpg', name: 'Valentimes',                                                                                         description: 'Color pencil with a black ink outline on paper' },
    { thumb: '/subsections/analog/analog_thumb/analog-18.jpg', full: '/subsections/analog/analog_full/analog-18.jpg', name: 'Crossing the Croquet Fields',                                                                        description: 'Color pencil with a black ink outline on paper' },
    { thumb: '/subsections/analog/analog_thumb/analog-19.jpg', full: '/subsections/analog/analog_full/analog-19.jpg', name: 'And For My Next Trick',                                                                              description: 'Color pencil with a black ink outline on paper' },
    { thumb: '/subsections/analog/analog_thumb/analog-20.jpg', full: '/subsections/analog/analog_full/analog-20.jpg', name: 'the Crossroads',                                                                                     description: 'Color pencil with a black ink outline on paper' },
];

function init() {

    document.getElementById('desktop-title').innerText = title;
    document.getElementById('mobile-title').innerText = title;

    document.getElementById('desktop-description').innerHTML = description;
    document.getElementById('mobile-description').innerHTML = description;

    const grid = document.getElementById('thumbnail-grid');

    images.forEach((img, index) => {

        if (index % 7 === 0) {
            const emptyStart = document.createElement('div');
            emptyStart.className = "aspect-[3/4]";
            grid.appendChild(emptyStart);
        }

        const thumbDiv = document.createElement('div');
        thumbDiv.className = "aspect-[3/4] bg-gray-900 cursor-pointer overflow-hidden group border border-transparent hover:border-[#8bc34a]";
        thumbDiv.onclick = () => openLightbox(index);

        const image = document.createElement('img');
        image.src = img.thumb;

        image.classList.add("thumb-img");
        image.onload = () => image.classList.add("visible");

        image.className += " w-full h-full object-cover grayscale group-hover:grayscale-0 transition-all duration-500 scale-105 group-hover:scale-100";
        image.referrerPolicy = "no-referrer";

        thumbDiv.appendChild(image);
        grid.appendChild(thumbDiv);

        if (index % 7 === 6 || index === images.length - 1) {
            const emptyEnd = document.createElement('div');
            emptyEnd.className = "aspect-[3/4]";
            grid.appendChild(emptyEnd);
        }
    });

    const stack = document.getElementById('mobile-image-stack');

    images.forEach((img) => {
        const container = document.createElement('div');
        container.className = "w-full bg-gray-900 overflow-hidden";

        const image = document.createElement('img');
        image.src = img.full;

        image.classList.add("thumb-img");
        image.onload = () => image.classList.add("visible");

        image.className += " w-full h-auto block";
        image.referrerPolicy = "no-referrer";

        container.appendChild(image);
        stack.appendChild(container);
    });

    window.addEventListener('scroll', () => {
        const indicator = document.getElementById('scroll-indicator');
        indicator.style.opacity = window.scrollY > 100 ? '0' : '1';
    });
}

function openLightbox(index) {
    window.parent.postMessage({
        type: 'OPEN_LIGHTBOX',
        images: images,
        index: index
    }, '*');
}

window.onload = init;

</script>

</body>
</html>
