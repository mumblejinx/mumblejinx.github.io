<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analog - Work</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap');
        
        body {
            background-color: black;
            color: white;
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #000; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #444; }

        @keyframes bounce-scroll {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        .animate-bounce-scroll {
            animation: bounce-scroll 2s infinite ease-in-out;
        }

        /* FADE-IN SYSTEM */
        .thumb-img {
            opacity: 0;
            transition: opacity 0.8s ease;
        }
        .thumb-img.visible {
            opacity: 1;
        }
    </style>
</head>

<body class="bg-black">

<!-- DESKTOP -->
<div id="desktop-layout" class="hidden md:flex flex-row p-8 pb-0 gap-8 h-screen">

    <!-- FIXED IMAGE GRID -->
    <div class="w-2/3 h-full flex items-center justify-center">
        <div id="thumbnail-grid" class="grid grid-cols-9 gap-2 w-full max-w-fit"></div>
    </div>

    <!-- SCROLLABLE TEXT -->
    <div class="w-1/3 h-full overflow-y-auto pr-4">
        <h1 id="desktop-title" class="text-[#8bc34a] text-4xl font-bold mb-6 uppercase tracking-tighter"></h1>

        <div id="desktop-description"
             class="text-gray-300 text-lg leading-relaxed space-y-4 pb-20">
        </div>
    </div>

</div>

<!-- MOBILE -->
<div id="mobile-layout" class="md:hidden flex flex-col min-h-screen p-4 pb-24">

    <div id="mobile-image-stack" class="flex flex-col gap-4 mb-12"></div>

    <div class="mt-8 border-t border-gray-800 pt-8">
        <h1 id="mobile-title" class="text-[#8bc34a] text-3xl font-bold mb-4 uppercase tracking-tighter"></h1>
        <div id="mobile-description" class="text-gray-400 text-base leading-relaxed space-y-4"></div>
    </div>

    <div id="scroll-indicator" class="fixed bottom-4 left-6 z-40 pointer-events-none">
        <div class="flex items-center gap-2 text-white font-bold text-xs tracking-widest animate-bounce-scroll">
            <span>▼ SCROLL</span>
        </div>
    </div>

</div>

<script>

const title = "ANALOG / アナログ";

const description = `
    <p>I love drawing. It is probably the activity that I can trace back through almost my whole life. I taught myself to hold a pencil 
    before entering the school system in order to draw. Consequently I hold a pencil differently than what is recommended and it’s caused my 
    forefinger to grow with a bend in it and has caused a large gap between my fore- and middle finger. </p>
<p>I took art very seriously as a kid and when I was in elementary school I started to take group art classes offered at a church by a woman 
who used to work as a designer for an ad agency. I would draw pictures out of Walter Lantz art instruction books. However I would never allow 
myself to work in color. I thought I needed to perfect black and white first and then I could work in color. It is probably part of the reason 
I use such bright colors in my work now.  These pieces are part of the work I was doing from 1997-2013. They are all colored pencil pieces with 
black ink outlines.</p>

<p>私は「描くこと」がとても好きです。
自分の人生のほとんどにわたって続いている活動です。</p>
<p>学校に入る前から、絵を描くために独学で鉛筆の持ち方を覚えました。
そのため一般的な持ち方とは少し違っていて、人差し指が少し曲がっていたり、人差し指と中指の間に大きな隙間ができています。</p>
<p>子どもの頃は、とても真剣に美術に向き合っていました。
小学生の頃には、教会で開かれていたグループのアート教室に通い始めました。そこでは、広告会社でデザイナーとして働いていた経験のある女性が指導していました。</p>
<p>また、Walter Lantz の作画指導本を参考にしながら絵を描いていました。
ただし当時は、色を使うことを自分に許していませんでした。まずは白黒で完成度を高めるべきだと考えていたからです。</p>
<p>その反動もあってか、現在の作品ではとても鮮やかな色を使うようになっています。</p>
<p>ここにある作品は、1997年から2013年に制作したものです。
すべて、黒インクの線と色鉛筆によって制作されています。</p>

`;

const images = Array.from({ length: 21 }, (_, i) => ({
    thumb: `/subsections/analog/analog_thumb/analog-${i}.jpg`,
    full: `/subsections/analog/analog_full/analog-${i}.jpg`,
    description: `Analog piece #${i + 1}`
}));

function init() {

    document.getElementById('desktop-title').innerText = title;
    document.getElementById('mobile-title').innerText = title;

    document.getElementById('desktop-description').innerHTML = description;
    document.getElementById('mobile-description').innerHTML = description;

    const grid = document.getElementById('thumbnail-grid');

    images.forEach((img, index) => {

        if (index % 7 === 0) {
            const emptyStart = document.createElement('div');
            emptyStart.className = "aspect-[3/4]";
            grid.appendChild(emptyStart);
        }

        const thumbDiv = document.createElement('div');
        thumbDiv.className = "aspect-[3/4] bg-gray-900 cursor-pointer overflow-hidden group border border-transparent hover:border-[#8bc34a]";
        thumbDiv.onclick = () => openLightbox(index);

        const image = document.createElement('img');
        image.src = img.thumb;

        image.classList.add("thumb-img");
        image.onload = () => image.classList.add("visible");

        image.className += " w-full h-full object-cover grayscale group-hover:grayscale-0 transition-all duration-500 scale-105 group-hover:scale-100";
        image.referrerPolicy = "no-referrer";

        thumbDiv.appendChild(image);
        grid.appendChild(thumbDiv);

        if (index % 7 === 6 || index === images.length - 1) {
            const emptyEnd = document.createElement('div');
            emptyEnd.className = "aspect-[3/4]";
            grid.appendChild(emptyEnd);
        }
    });

    const stack = document.getElementById('mobile-image-stack');

    images.forEach((img) => {
        const container = document.createElement('div');
        container.className = "w-full bg-gray-900 overflow-hidden";

        const image = document.createElement('img');
        image.src = img.full;

        image.classList.add("thumb-img");
        image.onload = () => image.classList.add("visible");

        image.className += " w-full h-auto block";
        image.referrerPolicy = "no-referrer";

        container.appendChild(image);
        stack.appendChild(container);
    });

    window.addEventListener('scroll', () => {
        const indicator = document.getElementById('scroll-indicator');
        indicator.style.opacity = window.scrollY > 100 ? '0' : '1';
    });
}

function openLightbox(index) {
    window.parent.postMessage({
        type: 'OPEN_LIGHTBOX',
        images: images,
        index: index
    }, '*');
}

window.onload = init;

</script>

</body>
</html>
