<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analog - Work</title>

    <style>
        body {
            background-color: black;
            color: white;
            font-family: sans-serif;
            padding: 20px;
        }

        h1 { color: #8bc34a; }

        /* =========================
           GALLERY GRID
        ========================= */
        #gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 16px;
            margin-top: 30px;
        }

        /* =========================
           IMAGE STYLE + FADE-IN
        ========================= */
        .gallery-img {
            width: 100%;
            height: auto;

            opacity: 0;
            transform: translateY(10px);

            transition:
                opacity 0.8s ease,
                transform 0.8s ease;
        }

        .gallery-img.visible {
            opacity: 1;
            transform: translateY(0);
        }

    </style>
</head>

<body>

    <h1>ANALOG</h1>

    <p>This is the ANALOG subsection of the WORK section.</p>
    <p>Placeholder content for analog photography and art.</p>


    <!-- =========================
         IMAGE GALLERY
         (AUTO BUILT FROM JS)
    ========================= -->
    <div id="gallery"></div>


    <script>

    /* =========================
       🔧 EDIT YOUR IMAGES HERE
    ========================= */
    const images = [
        "/images/analog/img1.jpg",
        "/images/analog/img2.jpg",
        "/images/analog/img3.jpg",
        "/images/analog/img4.jpg"
    ];


    /* =========================
       BUILD GALLERY
    ========================= */
    function buildGallery() {

        const gallery = document.getElementById("gallery");

        images.forEach((src, index) => {

            const img = document.createElement("img");

            img.src = src;
            img.className = "gallery-img";

            gallery.appendChild(img);

            // staggered fade-in
            setTimeout(() => {
                img.classList.add("visible");
            }, index * 120); // adjust speed here if you want

        });
    }

    window.onload = buildGallery;

    </script>

</body>
</html>
