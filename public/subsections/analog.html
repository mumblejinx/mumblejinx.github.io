<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Analog - Work</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body {
    background: black;
    color: white;
    margin: 0;
    overflow-x: hidden;
}

/* =========================
   PAGE FADE IN
========================= */
body {
    animation: fadeIn 1.2s ease;
}

@keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
}

/* =========================
   GRID (DESKTOP)
========================= */
#gallery {
    column-count: 3;
    column-gap: 16px;
}

@media (max-width: 1024px) {
    #gallery { column-count: 2; }
}

@media (max-width: 640px) {
    #gallery { column-count: 1; }
}

/* =========================
   IMAGE STYLE
========================= */
.gallery-img {
    width: 100%;
    margin-bottom: 16px;
    cursor: pointer;

    opacity: 0;
    transform: translateY(10px);

    transition:
        opacity 0.8s ease,
        transform 0.8s ease,
        filter 0.6s ease;
}

/* fade in */
.gallery-img.visible {
    opacity: 1;
    transform: translateY(0);
}

/* subtle grayscale (CAN REMOVE IF YOU WANT) */
.gallery-img {
    filter: grayscale(100%);
}

.gallery-img:hover {
    filter: grayscale(0%);
}

/* =========================
   LIGHTBOX
========================= */
#lightbox {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.95);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 1000;
}

#lightbox img {
    max-width: 90vw;
    max-height: 85vh;
    object-fit: contain;
    opacity: 0;
    transition: opacity 0.5s ease;
}

#lightbox img.visible {
    opacity: 1;
}

.lightbox-arrow {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    font-size: 28px;
    padding: 12px;
    border: 1px solid #444;
    cursor: pointer;
    opacity: 0.6;
}

.lightbox-arrow:hover {
    opacity: 1;
}

#prev { left: 20px; }
#next { right: 20px; }

#close {
    position: absolute;
    top: 20px;
    right: 20px;
    border: 1px solid #444;
    padding: 8px 12px;
    cursor: pointer;
    opacity: 0.6;
}

#close:hover {
    opacity: 1;
}

/* =========================
   SCROLL INDICATOR (MOBILE)
========================= */
@keyframes bounce {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
}

#scroll-indicator {
    position: fixed;
    bottom: 20px;
    left: 20px;
    font-size: 12px;
    opacity: 0.7;
    animation: bounce 2s infinite;
}
</style>
</head>

<body>

<!-- =========================
     HEADER (EDIT TEXT HERE)
========================= -->
<div class="p-6">
    <h1 class="text-[#8bc34a] text-3xl font-bold uppercase">
        ANALOG
    </h1>

    <p class="text-gray-400 mt-2">
        <!-- EDIT THIS TEXT -->
        Analog photography and image-based work.
    </p>
</div>


<!-- =========================
     GALLERY
========================= -->
<div id="gallery" class="px-4 pb-20"></div>


<!-- =========================
     LIGHTBOX
========================= -->
<div id="lightbox">

    <div id="close" onclick="closeLightbox()">✕</div>

    <div id="prev" class="lightbox-arrow" onclick="prevImage()">←</div>
    <div id="next" class="lightbox-arrow" onclick="nextImage()">→</div>

    <img id="lightbox-img">

</div>


<!-- =========================
     SCROLL INDICATOR
========================= -->
<div id="scroll-indicator" class="md:hidden">
    ▼ SCROLL
</div>


<script>

/* =========================
   🔧 EDIT YOUR IMAGES HERE
========================= */

const images = [
    "/images/analog/img1.jpg",
    "/images/analog/img2.jpg",
    "/images/analog/img3.jpg",
    "/images/analog/img4.jpg",
    "/images/analog/img5.jpg"
];


/* =========================
   STATE
========================= */

let currentIndex = 0;


/* =========================
   BUILD GALLERY
========================= */

function buildGallery() {

    const gallery = document.getElementById("gallery");

    images.forEach((src, i) => {

        const img = document.createElement("img");

        img.src = src;
        img.className = "gallery-img";

        img.onclick = () => openLightbox(i);

        gallery.appendChild(img);

        // staggered fade-in
        setTimeout(() => {
            img.classList.add("visible");
        }, i * 80);
    });
}


/* =========================
   LIGHTBOX
========================= */

function openLightbox(index) {
    currentIndex = index;

    document.getElementById("lightbox").style.display = "flex";

    updateLightbox();
}

function updateLightbox() {

    const img = document.getElementById("lightbox-img");

    img.classList.remove("visible");

    setTimeout(() => {
        img.src = images[currentIndex];
        img.classList.add("visible");
    }, 100);
}

function closeLightbox() {
    document.getElementById("lightbox").style.display = "none";
}

function nextImage() {
    currentIndex = (currentIndex + 1) % images.length;
    updateLightbox();
}

function prevImage() {
    currentIndex = (currentIndex - 1 + images.length) % images.length;
    updateLightbox();
}


/* =========================
   KEYBOARD
========================= */

document.addEventListener("keydown", (e) => {

    if (document.getElementById("lightbox").style.display === "flex") {
        if (e.key === "ArrowRight") nextImage();
        if (e.key === "ArrowLeft") prevImage();
        if (e.key === "Escape") closeLightbox();
    }
});


/* =========================
   SCROLL INDICATOR FADE
========================= */

window.addEventListener("scroll", () => {

    const el = document.getElementById("scroll-indicator");

    if (window.scrollY > 100) {
        el.style.opacity = 0;
    } else {
        el.style.opacity = 0.7;
    }
});


/* =========================
   INIT
========================= */

window.onload = buildGallery;

</script>

</body>
</html>
