<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Street - Work</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap');
        
        body {
            background-color: black;
            color: white;
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #000; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #444; }

        @keyframes bounce-scroll {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        .animate-bounce-scroll {
            animation: bounce-scroll 2s infinite ease-in-out;
        }

        /* FADE-IN SYSTEM */
        .thumb-img {
            opacity: 0;
            transition: opacity 0.8s ease;
        }
        .thumb-img.visible {
            opacity: 1;
        }

        .h-dvh-safe { height: 100vh; height: 100dvh; }
        .min-h-dvh-safe { min-height: 100vh; min-height: 100dvh; }
    </style>
</head>

<body class="bg-black">

<!-- DESKTOP -->
<div id="desktop-layout" class="hidden lg:flex flex-row p-8 pb-0 gap-8 h-dvh-safe max-w-[1600px] mx-auto w-full">

    <!-- FIXED IMAGE GRID -->
    <div class="w-3/5 h-full flex items-center justify-center">
        <div id="thumbnail-grid" class="grid grid-cols-9 gap-2 w-full max-w-fit"></div>
    </div>

    <!-- SCROLLABLE TEXT -->
    <div class="w-2/5 h-full overflow-y-auto pr-4">
        <h1 id="desktop-title" class="text-[#8bc34a] text-4xl font-bold mb-6 uppercase tracking-tighter"></h1>

        <div id="desktop-description"
             class="text-gray-300 text-lg leading-relaxed space-y-4 pb-20">
        </div>
    </div>

</div>

<!-- MOBILE -->
<div id="mobile-layout" class="lg:hidden flex flex-col min-h-dvh-safe p-4 pb-24">

    <div id="mobile-image-stack" class="flex flex-col gap-4 mb-12"></div>

    <div class="mt-8 border-t border-gray-800 pt-8">
        <h1 id="mobile-title" class="text-[#8bc34a] text-3xl font-bold mb-4 uppercase tracking-tighter"></h1>
        <div id="mobile-description" class="text-gray-400 text-base leading-relaxed space-y-4"></div>
    </div>

    <div id="scroll-indicator" class="fixed bottom-4 left-6 z-40 pointer-events-none">
        <div class="flex items-center gap-2 text-white font-bold text-xs tracking-widest animate-bounce-scroll">
            <span>▼ SCROLL</span>
        </div>
    </div>

</div>

<script>

const title = "STREET / 現場";

const description = `
    <p>Hip Hop has been a big influence on my life since I first saw breakdancing in movies in the early 1980s and heard Run DMC. I wanted to get into all of the elements — DJing, MCing, BBboying, Graffiti. Of all of them, Graffiti was the hardest to find my way into. It wasn’t a thing in small town rural Michigan.</p>

    <p>In the early 2000s I was living in Seattle. I was aware of the Street Art movement that was taking off but it didn’t interest me that much at first. Then I met an artist called Blue Baby at a show and he gave me a handful of stickers. I liked how he was using stickers of his art as a way to connect with other people. That was my door in.</p>

    <p>I started trading stickers with artists online and sending work to shows all over the world. What I came to realize was that it wasn’t putting my own art on the street that I found most interesting — it was the conversation I was having with all these other artists, people I knew and didn’t know, with different life experiences and different goals than my own. I came to believe that Street Art is an art form of emergence. It’s not any one artist that makes it interesting. It’s all these different voices layered on top of each other that makes it special.</p>

    <p>So I started making collages from the stickers artists had sent me over the years. I’ve since met a lot of artists whose work I find fantastic, and they support the project by sending me their work to use. I work mainly non-destructively now, using magnets, which gives someone the opportunity to take the work home if they want it. These aren’t pieces I would ever charge money for — since they include so much work from other artists. And if someone wants a piece for their home I encourage it, because eventually, outside, the work is going to bleach.</p>

    <p>ヒップホップは、1980年代初めに映画でブレイクダンスを初めて見て、ランDMCの音楽を聴いて以来、私の人生に大きな影響を与え続けています。DJing、MCing、ブレイクダンス、グラフィティ——すべての要素に関わりたいと思っていました。その中でもグラフィティは、自分のものにするのが一番難しかった。当時の田舎町のミシガン州には、そういった文化がなかったのです。</p>

    <p>2000年代初頭、私はシアトルに住んでいました。ストリートアートの動きが広がっていることは知っていましたが、最初はそれほど強い関心はありませんでした。転機となったのは、あるアートショーでブルー・ベイビーというアーティストに出会い、彼から何枚かのステッカーをもらったことです。自分のアートをステッカーという形で人と共有し、つながっていくその方法に魅力を感じました。それが入口でした。</p>

    <p>その後、オンラインでアーティストたちとステッカーを交換したり、世界中のショーに作品を送ったりするようになりました。そこで気づいたのは、自分の作品を街に貼ること以上に、知っているアーティストも知らないアーティストも含めた、さまざまな人生経験や目標を持つ人たちとの対話こそが、自分にとって本当に面白いということでした。ストリートアートは、創発のアート形式だと私は考えています。特定のアーティスト一人が面白いのではない。さまざまな声が幾重にも重なり合うことで、特別なものが生まれるのです。</p>

    <p>そこで、長年にわたって送ってもらったステッカーでコラージュを作り始めました。今では、素晴らしいと思う作品を作るアーティストたちと知り合い、彼らも私の活動を理解して、使用する作品を送ってくれています。制作は主に非破壊的な方法で、マグネットを多用しています。気に入った人が作品を持ち帰れるようにしたいからです。他のアーティストの作品を多く含むこれらの作品は、販売するつもりはありません。誰かが気に入って自宅に持ち帰りたいなら、それを勧めています。屋外の作品は、いずれ色あせてしまうからです。</p>
`;

const images = [
    { thumb: '/subsections/street/street_thumb/street-0.jpg',  full: '/subsections/street/street_full/street-0.jpg',  name: 'Fukuoka, Japan',           description: 'Street Art hunting in Fukuoka, Japan' },
    { thumb: '/subsections/street/street_thumb/street-1.jpg',  full: '/subsections/street/street_full/street-1.jpg',  name: 'Fukuoka, Japan',           description: 'Street Art hunting in Fukuoka, Japan' },
    { thumb: '/subsections/street/street_thumb/street-2.jpg',  full: '/subsections/street/street_full/street-2.jpg',  name: 'Fukuoka, Japan',           description: 'Street Art hunting in Fukuoka, Japan' },
    { thumb: '/subsections/street/street_thumb/street-3.jpg',  full: '/subsections/street/street_full/street-3.jpg',  name: 'Tokyo, Japan',             description: 'Street Art hunting in Tokyo, Japan' },
    { thumb: '/subsections/street/street_thumb/street-4.jpg',  full: '/subsections/street/street_full/street-4.jpg',  name: 'Fukuoka, Japan',           description: 'Street Art hunting in Fukuoka, Japan' },
    { thumb: '/subsections/street/street_thumb/street-5.jpg',  full: '/subsections/street/street_full/street-5.jpg',  name: 'Fukuoka, Japan',           description: 'Street Art hunting in Fukuoka, Japan' },
    { thumb: '/subsections/street/street_thumb/street-6.jpg',  full: '/subsections/street/street_full/street-6.jpg',  name: 'Fukuoka, Japan',           description: 'Street Art hunting in Fukuoka, Japan' },
    { thumb: '/subsections/street/street_thumb/street-7.jpg',  full: '/subsections/street/street_full/street-7.jpg',  name: 'Seattle, Washington',      description: 'Street Art hunting in Seattle, Washington' },
    { thumb: '/subsections/street/street_thumb/street-8.jpg',  full: '/subsections/street/street_full/street-8.jpg',  name: 'Pittsburgh, Pennsylvania', description: 'Street Art hunting in Pittsburgh, Pennsylvania' },
    { thumb: '/subsections/street/street_thumb/street-9.jpg',  full: '/subsections/street/street_full/street-9.jpg',  name: 'Fukuoka, Japan',           description: 'Street Art hunting in Fukuoka, Japan' },
    { thumb: '/subsections/street/street_thumb/street-10.jpg', full: '/subsections/street/street_full/street-10.jpg', name: 'Pittsburgh, Pennsylvania', description: 'Street Art hunting in Pittsburgh, Pennsylvania' },
    { thumb: '/subsections/street/street_thumb/street-11.jpg', full: '/subsections/street/street_full/street-11.jpg', name: 'Anderson, South Carolina',  description: 'Street Art hunting in Anderson, South Carolina' },
    { thumb: '/subsections/street/street_thumb/street-12.jpg', full: '/subsections/street/street_full/street-12.jpg', name: 'Pittsburgh, Pennsylvania', description: 'Street Art hunting in Pittsburgh, Pennsylvania' },
    { thumb: '/subsections/street/street_thumb/street-13.jpg', full: '/subsections/street/street_full/street-13.jpg', name: 'Pendleton, South Carolina', description: 'Street Art hunting in Pendleton, South Carolina' },
    { thumb: '/subsections/street/street_thumb/street-14.jpg', full: '/subsections/street/street_full/street-14.jpg', name: 'Pittsburgh, Pennsylvania', description: 'Street Art hunting in Pittsburgh, Pennsylvania' },
    { thumb: '/subsections/street/street_thumb/street-15.jpg', full: '/subsections/street/street_full/street-15.jpg', name: 'Anderson, South Carolina',  description: 'Street Art hunting in Anderson, South Carolina' },
    { thumb: '/subsections/street/street_thumb/street-16.jpg', full: '/subsections/street/street_full/street-16.jpg', name: 'Pittsburgh, Pennsylvania', description: 'Street Art hunting in Pittsburgh, Pennsylvania' },
    { thumb: '/subsections/street/street_thumb/street-17.jpg', full: '/subsections/street/street_full/street-17.jpg', name: 'Anderson, South Carolina',  description: 'Street Art hunting in Anderson, South Carolina' },
    { thumb: '/subsections/street/street_thumb/street-18.jpg', full: '/subsections/street/street_full/street-18.jpg', name: 'Pittsburgh, Pennsylvania', description: 'Street Art hunting in Pittsburgh, Pennsylvania' },
    { thumb: '/subsections/street/street_thumb/street-19.jpg', full: '/subsections/street/street_full/street-19.jpg', name: 'Anderson, South Carolina',  description: 'Street Art hunting in Anderson, South Carolina' },
    { thumb: '/subsections/street/street_thumb/street-20.jpg', full: '/subsections/street/street_full/street-20.jpg', name: 'Anderson, South Carolina',  description: 'Street Art hunting in Anderson, South Carolina' },
];

function init() {

    document.getElementById('desktop-title').innerText = title;
    document.getElementById('mobile-title').innerText = title;

    document.getElementById('desktop-description').innerHTML = description;
    document.getElementById('mobile-description').innerHTML = description;

    const grid = document.getElementById('thumbnail-grid');

    images.forEach((img, index) => {

        if (index % 7 === 0) {
            const emptyStart = document.createElement('div');
            emptyStart.className = "aspect-[3/4]";
            grid.appendChild(emptyStart);
        }

        const thumbDiv = document.createElement('div');
        thumbDiv.className = "aspect-[3/4] bg-gray-900 cursor-pointer overflow-hidden group border border-transparent hover:border-[#8bc34a]";
        thumbDiv.onclick = () => openLightbox(index);

        const image = document.createElement('img');
        image.src = img.thumb;

        image.classList.add("thumb-img");
        image.onload = () => image.classList.add("visible");

        image.className += " w-full h-full object-cover grayscale group-hover:grayscale-0 transition-all duration-500 scale-105 group-hover:scale-100";
        image.referrerPolicy = "no-referrer";

        thumbDiv.appendChild(image);
        grid.appendChild(thumbDiv);

        if (index % 7 === 6 || index === images.length - 1) {
            const emptyEnd = document.createElement('div');
            emptyEnd.className = "aspect-[3/4]";
            grid.appendChild(emptyEnd);
        }
    });

    const stack = document.getElementById('mobile-image-stack');

    images.forEach((img) => {
        const container = document.createElement('div');
        container.className = "w-full bg-gray-900 overflow-hidden";

        const image = document.createElement('img');
        image.src = img.full;

        image.classList.add("thumb-img");
        image.onload = () => image.classList.add("visible");

        image.className += " w-full h-auto block";
        image.referrerPolicy = "no-referrer";

        container.appendChild(image);
        stack.appendChild(container);
    });

    window.addEventListener('scroll', () => {
        const indicator = document.getElementById('scroll-indicator');
        indicator.style.opacity = window.scrollY > 100 ? '0' : '1';
    });
}

function openLightbox(index) {
    window.parent.postMessage({
        type: 'OPEN_LIGHTBOX',
        images: images,
        index: index
    }, '*');
}

window.onload = init;

</script>

</body>
</html>
