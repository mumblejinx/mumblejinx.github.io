<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Street - Work</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap');
        
        body {
            background-color: black;
            color: white;
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #000; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #444; }

        @keyframes bounce-scroll {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        .animate-bounce-scroll {
            animation: bounce-scroll 2s infinite ease-in-out;
        }

        /* FADE-IN SYSTEM */
        .thumb-img {
            opacity: 0;
            transition: opacity 0.8s ease;
        }
        .thumb-img.visible {
            opacity: 1;
        }
    </style>
</head>

<body class="bg-black">

<!-- DESKTOP -->
<div id="desktop-layout" class="hidden md:flex flex-row p-8 pb-0 gap-8 h-screen">

    <!-- FIXED IMAGE GRID -->
    <div class="w-3/5 h-full flex items-center justify-center">
        <div id="thumbnail-grid" class="grid grid-cols-9 gap-2 w-full max-w-fit"></div>
    </div>

    <!-- SCROLLABLE TEXT -->
    <div class="w-2/5 h-full overflow-y-auto pr-4">
        <h1 id="desktop-title" class="text-[#8bc34a] text-4xl font-bold mb-6 uppercase tracking-tighter"></h1>

        <div id="desktop-description"
             class="text-gray-300 text-lg leading-relaxed space-y-4 pb-20">
        </div>
    </div>

</div>

<!-- MOBILE -->
<div id="mobile-layout" class="md:hidden flex flex-col min-h-screen p-4 pb-24">

    <div id="mobile-image-stack" class="flex flex-col gap-4 mb-12"></div>

    <div class="mt-8 border-t border-gray-800 pt-8">
        <h1 id="mobile-title" class="text-[#8bc34a] text-3xl font-bold mb-4 uppercase tracking-tighter"></h1>
        <div id="mobile-description" class="text-gray-400 text-base leading-relaxed space-y-4"></div>
    </div>

    <div id="scroll-indicator" class="fixed bottom-4 left-6 z-40 pointer-events-none">
        <div class="flex items-center gap-2 text-white font-bold text-xs tracking-widest animate-bounce-scroll">
            <span>▼ SCROLL</span>
        </div>
    </div>

</div>

<script>

const title = "STREET / 現場";

const description = `
    <p>Hip Hop has been a big influence on my life ever since I first saw breakdancing in movies in the early 
1980s and heard Run DMC. I wanted to get into all of the different elements, Djing, Mcing, Bboying and Graffiti.  
Out of all of them, Graffiti was the hardest to find my way. It was not a thing in small town rural Michigan at 
the time.</p>
<p>In the early 2000s I was living in Seattle. I was aware of the Street Art movement that was taking off but it 
didn’t interest me that much at first. Then I met this artist the Blue Baby at a party I was showing art at and he 
gave me a handful of stickers.  I liked how he was using stickers of his art as a way to connect with other people. 
Later another artist, Zac Boetes, introduced me to the larger international community of sticker arts online and I 
started trading stickers with people and sending stickers to art shows all over the world.</p>
<p>After amassing stickers from other artists for about seven years I moved to Pittsburgh.  Pittsburgh, unlike Seattle, 
did not have that big of a Street Art scene. I came to realize pretty quickly that it wasn’t just putting my own art 
up on the street that I found interesting.  I was the conservation I was having with all these other artists who I 
knew and didn’t know. Artists who had different life experiences and goals than my own.  I came to believe that Street 
Art is an art form of emergence.  It’s not any one particular artist that makes it interesting, it’s all these different 
voices layered on top of each other that make it special.  So I started making collages with all the stickers people had 
sent me over the years. I am now lucky because I have met a lot of artists whose work I think is fantastic and they see 
what I’m doing and they help support this project by sending me their work to use. </p>
<p>Now I work mainly non-destructively using a lot of magnets. I like this because it gives someone else the opportunity 
to take the work home if they like it.  Since I include so much work from other artists these aren’t pieces I would ever
 charge money for. And if someone likes the work and wants it for their home I try to encourage that because eventually,
 outside, the artwork is going to bleach. </p>

<p>ヒップホップは、1980年代初頭に映画でブレイクダンスを見て、Run DMC を聴いたときから、ずっと自分の人生に大きな影響を与え
てきました。DJ、MC、ブレイクダンス、グラフィティといった、ヒップホップのあらゆる要素に関わりたいと思っていました。</p>
<p>その中でも、グラフィティは自分にとって最も入り口が難しい分野でした。当時、自分が育ったミシガン州の小さな田舎町では、
グラフィティ文化に触れる機会がほとんどなかったからです。</p>
<p>2000年代初頭、シアトルに住んでいた頃、ストリートアートのムーブメントが広がり始めていることは知っていましたが、
最初はそれほど強い関心はありませんでした。そんな中、ある展示会のパーティーで「Blue Baby」というアーティストに出会い、
彼から何枚かのステッカーをもらいました。作品をステッカーという形で人と共有し、つながっていくその方法に魅力を感じました。
</p>
<p>その後、「Zac Boetes」というアーティストを通じて、オンライン上に広がる国際的なステッカーアートのコミュニティを知り、
世界中のアーティストとステッカーを交換したり、各地の展示に送ったりするようになりました。</p>
<p>約7年にわたって他のアーティストのステッカーを集めた後、ピッツバーグへ移りました。シアトルとは違い、
ピッツバーグには大きなストリートアートのシーンはありませんでした。その中で気づいたのは、自分の作品を街に貼ること以上に、
多くのアーティストとの“対話”そのものに強く惹かれているということでした。</p>
<p>それは、知っている人もいれば、まだ会ったことのない人もいる、多様な背景や価値観を持つアーティストたちとの対話です。
そうした経験を通して、ストリートアートは「エマージェンス（創発）」の芸術だと考えるようになりました。
特定の一人のアーティストが面白さを生み出すのではなく、さまざまな声や表現が重なり合うことで、
独自の魅力が生まれるのだと思っています。</p>
<p>そこで私は、これまでに集めてきたステッカーを使ってコラージュ作品を制作するようになりました。
ありがたいことに、素晴らしい作品を制作している多くのアーティストと出会い、私の活動に共感してくれた方々が、
自分の作品を送ってサポートしてくれています。</p>
<p>現在は、主にマグネットを使った非破壊的な方法で作品を展開しています。この方法は、
作品を気に入った人が持ち帰ることができるという点でも気に入っています。また、多くのアーティストの作品を含んでいるため、
これらを販売することは考えていません。誰かが気に入って自宅に持ち帰ってくれるのであれば、それをむしろ歓迎しています。
というのも、屋外に置かれた作品は、いずれ時間とともに色あせてしまうからです。</p>

</p>
`;

const images = Array.from({ length: 21 }, (_, i) => ({
    thumb: `/subsections/street/street_thumb/street-${i}.jpg`,
    full: `/subsections/street/street_full/street-${i}.jpg`,
    description: `Street piece #${i + 1}`
}));

function init() {

    document.getElementById('desktop-title').innerText = title;
    document.getElementById('mobile-title').innerText = title;

    document.getElementById('desktop-description').innerHTML = description;
    document.getElementById('mobile-description').innerHTML = description;

    const grid = document.getElementById('thumbnail-grid');

    images.forEach((img, index) => {

        if (index % 7 === 0) {
            const emptyStart = document.createElement('div');
            emptyStart.className = "aspect-[3/4]";
            grid.appendChild(emptyStart);
        }

        const thumbDiv = document.createElement('div');
        thumbDiv.className = "aspect-[3/4] bg-gray-900 cursor-pointer overflow-hidden group border border-transparent hover:border-[#8bc34a]";
        thumbDiv.onclick = () => openLightbox(index);

        const image = document.createElement('img');
        image.src = img.thumb;

        image.classList.add("thumb-img");
        image.onload = () => image.classList.add("visible");

        image.className += " w-full h-full object-cover grayscale group-hover:grayscale-0 transition-all duration-500 scale-105 group-hover:scale-100";
        image.referrerPolicy = "no-referrer";

        thumbDiv.appendChild(image);
        grid.appendChild(thumbDiv);

        if (index % 7 === 6 || index === images.length - 1) {
            const emptyEnd = document.createElement('div');
            emptyEnd.className = "aspect-[3/4]";
            grid.appendChild(emptyEnd);
        }
    });

    const stack = document.getElementById('mobile-image-stack');

    images.forEach((img) => {
        const container = document.createElement('div');
        container.className = "w-full bg-gray-900 overflow-hidden";

        const image = document.createElement('img');
        image.src = img.full;

        image.classList.add("thumb-img");
        image.onload = () => image.classList.add("visible");

        image.className += " w-full h-auto block";
        image.referrerPolicy = "no-referrer";

        container.appendChild(image);
        stack.appendChild(container);
    });

    window.addEventListener('scroll', () => {
        const indicator = document.getElementById('scroll-indicator');
        indicator.style.opacity = window.scrollY > 100 ? '0' : '1';
    });
}

function openLightbox(index) {
    window.parent.postMessage({
        type: 'OPEN_LIGHTBOX',
        images: images,
        index: index
    }, '*');
}

window.onload = init;

</script>

</body>
</html>
