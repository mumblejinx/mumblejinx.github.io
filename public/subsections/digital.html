<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital - Work</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap');
        
        body {
            background-color: black;
            color: white;
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #000; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #444; }

        @keyframes bounce-scroll {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        .animate-bounce-scroll {
            animation: bounce-scroll 2s infinite ease-in-out;
        }

        /* FADE-IN SYSTEM (USED EVERYWHERE) */
        .thumb-img {
            opacity: 0;
            transition: opacity 0.8s ease;
        }
        .thumb-img.visible {
            opacity: 1;
        }

    </style>
</head>

<body class="bg-black">

<!-- DESKTOP -->
<div id="desktop-layout" class="hidden md:flex flex-row p-8 pb-0 gap-8 h-full">

    <div class="w-2/3 overflow-y-auto pr-4 flex items-center justify-center">
        <div id="thumbnail-grid" class="grid grid-cols-9 gap-2 w-full max-w-fit"></div>
    </div>

    <div class="w-1/3 flex flex-col justify-start text-left">
        <h1 id="desktop-title" class="text-[#8bc34a] text-4xl font-bold mb-6 uppercase tracking-tighter"></h1>
        <div id="desktop-description" class="text-gray-300 text-lg leading-relaxed space-y-4"></div>
    </div>

</div>

<!-- MOBILE -->
<div id="mobile-layout" class="md:hidden flex flex-col min-h-screen p-4 pb-24">

    <div id="mobile-image-stack" class="flex flex-col gap-4 mb-12"></div>

    <div class="mt-8 border-t border-gray-800 pt-8">
        <h1 id="mobile-title" class="text-[#8bc34a] text-3xl font-bold mb-4 uppercase tracking-tighter"></h1>
        <div id="mobile-description" class="text-gray-400 text-base leading-relaxed space-y-4"></div>
    </div>

    <div id="scroll-indicator" class="fixed bottom-4 left-6 z-40 pointer-events-none">
        <div class="flex items-center gap-2 text-white font-bold text-xs tracking-widest animate-bounce-scroll">
            <span>▼ SCROLL</span>
        </div>
    </div>

</div>

<script>

const title = "DIGITAL / デジタル";

const description = `
    <p>I started working digitally in 1998. I had a pirated version of Photoshop. My computer was not really powerful enough to run Photoshop 
    so I would make some small change in the work and then need to go do something else for 15-20 minutes while my computer would process the change. Due to these hardware constraints </p>
<p>I didn’t really get into digital art until around 2003-2004 when I started making stickers for street art. I still draw my digital work on paper first. 
That is important to me. I draw the work on paper, ink it, scan it and then color the work digitally.  And I color the work from color patterns made out of samples 
from my colored pencil pieces. I like the texture it gives the work. I have started occasionally working in a more painterly style to broaden my art practice. I hope to 
continue to try new styles and new techniques.</p>

<p>デジタルでの制作を始めたのは1998年です。
当時は非公式に入手した Photoshop を使っていました。</p>
<p>しかし、当時のコンピューターは性能が低く、少し修正を加えるだけでも処理に15〜20分かかることがありました。
そのため、デジタル制作に本格的に取り組むようになったのは、2003年から2004年頃、ストリートアート用のステッカーを制作し始めてからです。</p>
<p>現在でも、デジタル作品は必ず紙の上でのドローイングから始めます。
これは自分にとってとても重要なプロセスです。</p>

`;

const images = Array.from({ length: 21 }, (_, i) => ({
    thumb: `/subsections/digital/digital_thumb/digital-${i}.jpg`,
    full: `/subsections/digital/digital_full/digital-${i}.jpg`,
    description: `Digital piece #${i + 1}`
}));

function init() {

    document.getElementById('desktop-title').innerText = title;
    document.getElementById('mobile-title').innerText = title;

    document.getElementById('desktop-description').innerHTML = description;
    document.getElementById('mobile-description').innerHTML = description;

    const grid = document.getElementById('thumbnail-grid');

    images.forEach((img, index) => {

        if (index % 7 === 0) {
            const emptyStart = document.createElement('div');
            emptyStart.className = "aspect-[3/4]";
            grid.appendChild(emptyStart);
        }

        const thumbDiv = document.createElement('div');
        thumbDiv.className = "aspect-[3/4] bg-gray-900 cursor-pointer overflow-hidden group border border-transparent hover:border-[#8bc34a]";
        thumbDiv.onclick = () => openLightbox(index);

        const image = document.createElement('img');
        image.src = img.thumb;

        /* DESKTOP FADE */
        image.classList.add("thumb-img");
        image.onload = () => image.classList.add("visible");

        image.className += " w-full h-full object-cover grayscale group-hover:grayscale-0 transition-all duration-500 scale-105 group-hover:scale-100";
        image.referrerPolicy = "no-referrer";

        thumbDiv.appendChild(image);
        grid.appendChild(thumbDiv);

        if (index % 7 === 6 || index === images.length - 1) {
            const emptyEnd = document.createElement('div');
            emptyEnd.className = "aspect-[3/4]";
            grid.appendChild(emptyEnd);
        }
    });

    /* MOBILE FADE-IN (NEW) */
    const stack = document.getElementById('mobile-image-stack');

    images.forEach((img, index) => {
        const container = document.createElement('div');
        container.className = "w-full bg-gray-900 overflow-hidden";

        const image = document.createElement('img');
        image.src = img.full;

        image.classList.add("thumb-img");
        image.onload = () => image.classList.add("visible");

        image.className += " w-full h-auto block";
        image.referrerPolicy = "no-referrer";

        container.appendChild(image);
        stack.appendChild(container);
    });

    window.addEventListener('scroll', () => {
        const indicator = document.getElementById('scroll-indicator');
        indicator.style.opacity = window.scrollY > 100 ? '0' : '1';
    });
}

function openLightbox(index) {
    window.parent.postMessage({
        type: 'OPEN_LIGHTBOX',
        images: images,
        index: index
    }, '*');
}

window.onload = init;

</script>

</body>
</html>
